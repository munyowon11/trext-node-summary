name: TREXT sample check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sample-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run sample replay
        run: bash scripts/trext.sh replay

      - name: Run Slurm reason report sample
        run: bash scripts/trext.sh report slurm-node-reasons

      - name: Build local evidence index
        run: bash scripts/trext.sh evidence-index

      - name: Run boundary check
        run: bash scripts/trext.sh check-boundary

      - name: Upload generated sample reports
        uses: actions/upload-artifact@v4
        with:
          name: trext-generated-sample-reports
          path: reports/generated/
          if-no-files-found: error
          retention-days: 7
